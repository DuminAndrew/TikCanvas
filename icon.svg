<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="256" height="256">
  <!-- 
    Цветовая палитра:
    - Фон: #0F172A (Темный сланец)
    - Окантовка и акцент: #22C55E (Ярко-зеленый)
    - Линии и узлы: #F8FAFC (Почти белый)
  -->

  <!-- Шестиугольник (Hexagon) с зеленой окантовкой -->
  <polygon points="60,5 112,32.5 112,87.5 60,115 8,87.5 8,32.5" 
           fill="#0F172A" 
           stroke="#22C55E" 
           stroke-width="6" 
           stroke-linejoin="round"/>

  <!-- Плавные пересекающиеся линии (Bézier curves) -->
  <g fill="none" stroke="#F8FAFC" stroke-width="5" stroke-linecap="round">
    <!-- Линия 1: Сверху-слева направо-вниз -->
    <path d="M35,35 C 50,75 70,45 85,85"/>
    <!-- Линия 2: Снизу-слева направо-вверх -->
    <path d="M35,85 C 50,45 70,75 85,35"/>
  </g>

  <!-- Центральный узел (пересечение) -->
  <circle cx="60" cy="60" r="10" fill="#22C55E"/>

  <!-- Конечные узлы (Nodes) -->
  <g fill="#F8FAFC">
    <circle cx="35" cy="35" r="5"/>
    <circle cx="85" cy="85" r="5"/>
    <circle cx="35" cy="85" r="5"/>
    <circle cx="85" cy="35" r="5"/>
  </g>
</svg>